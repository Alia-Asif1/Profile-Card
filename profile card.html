<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: white;
        }

        .card {
            width: 250px;
            margin: 100 auto;
            padding: 20px 15px;
            border-radius: 15px;
            border: none;
            box-shadow: 0 0 10px;
            background: whitesmoke;
            text-align: center;
            cursor: pointer;
        }

        img {
            width: 100px;
            border-radius: 50%;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            margin: 5px 0;
        }

        button {
            background-color: brown;
            padding: 10px;
            border-radius: 15px;
        }

        button:hover {
            background-color: burlywood;
        }

        .card:hover {
            transform: translateY(-10px);
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="1000033693.jpg" alt="Image" height="100">
        <H1>Alia Asif</H1>
        <p>Web Developer</p>
        <p>I love Bullding Website</p>
        <button>Follow</button>
    </div>
</body>

</html>
